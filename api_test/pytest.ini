[pytest]
# pytest配置文件

# 禁用测试ID转义
disable_test_id_escaping_and_forfeit_all_rights_to_community_support = True

# 测试标记 (用于分类和筛选测试用例)
markers =
    # 基础功能标记
    basic: 基础功能测试用例
    smoke: 冒烟测试用例

    # 模块标记
    auth: 认证授权模块
    user: 用户管理模块
    workflow: 工作流模块
    document: 文档管理模块
    attend: 考勤模块
    calendar: 日程模块
    crm: 客户关系管理模块
    report: 报表模块

    # 优先级标记
    P0: P0级用例(核心功能)
    P1: P1级用例(重要功能)
    P2: P2级用例(一般功能)
    P3: P3级用例(边缘功能)

    # 测试类型标记
    integration: 集成测试
    unit: 单元测试
    regression: 回归测试

# 测试用例目录
testpaths = tests

# 测试用例文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 最小Python版本
minversion = 3.7
