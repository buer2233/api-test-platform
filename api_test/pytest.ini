[pytest]
# pytest配置文件

disable_test_id_escaping_and_forfeit_all_rights_to_community_support = True

markers =
    basic: 基础功能测试用例
    smoke: 冒烟测试用例
    auth: 认证授权模块
    user: 用户管理模块
    workflow: 工作流模块
    document: 文档管理模块
    attend: 考勤模块
    calendar: 日程模块
    crm: 客户关系管理模块
    report: 报表模块
    P0: P0级用例(核心功能)
    P1: P1级用例(重要功能)
    P2: P2级用例(一般功能)
    P3: P3级用例(边缘功能)
    integration: 集成测试
    unit: 单元测试
    regression: 回归测试
    jsonplaceholder: 基于 JSONPlaceholder 公共测试站点的公开接口用例
    private_env: 依赖私有环境、真实账号和登录链路的外部集成测试

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
asyncio_default_fixture_loop_scope = function

minversion = 3.7
