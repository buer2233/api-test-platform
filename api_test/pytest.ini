[pytest]
# pytest配置文件

disable_test_id_escaping_and_forfeit_all_rights_to_community_support = True


testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
asyncio_default_fixture_loop_scope = function

minversion = 3.7
