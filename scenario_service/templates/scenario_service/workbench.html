<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: #eef4fb;
            background: linear-gradient(180deg, #08111a 0%, #0d1822 100%);
        }

        .page-shell {
            width: min(1480px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 32px;
        }

        .page-title {
            margin: 0 0 18px;
            font-size: clamp(28px, 4vw, 42px);
        }

        .mainline-shell {
            display: grid;
            grid-template-columns: 280px minmax(360px, 1fr) minmax(360px, 1fr);
            gap: 18px;
        }

        .panel {
            min-height: 520px;
            padding: 20px;
            border: 1px solid rgba(132, 165, 201, 0.18);
            border-radius: 20px;
            background: rgba(8, 20, 31, 0.88);
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .capture-entry-actions,
        .detail-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .capture-entry-actions button,
        .detail-tabs button {
            padding: 10px 14px;
            border: 1px solid rgba(240, 187, 99, 0.26);
            border-radius: 999px;
            background: rgba(240, 187, 99, 0.1);
            color: inherit;
            font: inherit;
        }

        .testcase-list-panel,
        .detail-fixed-summary {
            margin-top: 18px;
            padding: 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
        }

        @media (max-width: 1200px) {
            .mainline-shell {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="page-shell">
    <h1 class="page-title">{{ page_title }}</h1>
    <main class="mainline-shell" data-testid="mainline-shell">
        <aside class="panel left-tree-panel" data-testid="left-tree-panel">
            <h2>{{ left_panel_title }}</h2>
        </aside>
        <section class="panel middle-list-panel" data-testid="middle-list-panel">
            <h2>{{ middle_panel_title }}</h2>
            <header class="capture-entry-actions" data-testid="capture-entry-actions">
                <button type="button">{{ capture_primary_action }}</button>
                <button type="button">{{ capture_secondary_action }}</button>
            </header>
            <div class="testcase-list-panel" data-testid="testcase-list-panel"></div>
        </section>
        <section class="panel right-detail-panel" data-testid="right-detail-panel">
            <h2>{{ right_panel_title }}</h2>
            <div class="detail-fixed-summary" data-testid="detail-fixed-summary"></div>
            <div class="detail-tabs">
                <button type="button" data-testid="detail-tab-method-chain">{{ method_chain_label }}</button>
                <button type="button" data-testid="detail-tab-execution-history">{{ execution_history_label }}</button>
                <button type="button" data-testid="detail-tab-allure-report">{{ allure_report_label }}</button>
            </div>
        </section>
    </main>
</div>
</body>
</html>
